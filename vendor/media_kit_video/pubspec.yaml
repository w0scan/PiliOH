name: media_kit_video
description: Native implementation for video playback in package:media_kit.
homepage: https://github.com/media-kit/media-kit
repository: https://github.com/media-kit/media-kit
version: 1.2.5
topics:
  - video
  - video-player
  - audio
  - audio-player
  - cross-platform

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  flutter:
    sdk: flutter

  media_kit: ^1.1.11

  synchronized: ^3.4.0
  wakelock_plus: ^1.4.0
  screen_brightness_ios: ^2.1.2
  screen_brightness_android: ^2.1.3
  screen_brightness_platform_interface: ^2.1.0
  flutter_volume_controller: ^1.3.3
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_lints: ^6.0.0



flutter:
  plugin:
    platforms:
      windows:
        pluginClass: MediaKitVideoPluginCApi
      linux:
        pluginClass: MediaKitVideoPlugin
      macos:
        pluginClass: MediaKitVideoPlugin
      ios:
        pluginClass: MediaKitVideoPlugin
      android:
        package: com.alexmercerind.media_kit_video
        pluginClass: MediaKitVideoPlugin
      web:
