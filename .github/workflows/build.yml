name: Build

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
        paths-ignore:
            - "**.md"
    workflow_dispatch:
        inputs:

            # 鸿蒙构建开关
            build_ohos:
              description: "Build HarmonyOS"
              required: false
              default: true
              type: boolean

            tag:
                description: "tag"
                required: false
                default: ""
                type: string

jobs:
    ohos:
      if: ${{ (github.event_name == 'pull_request' && github.repository == 'bggRGjQaUbCoE/PiliPlus') || github.event.inputs.build_ohos == 'true' }}
      name: Release HarmonyOS HAP
      runs-on: macos-15
      permissions: write-all

      steps:
        - name: 代码迁出
          uses: actions/checkout@v6
          with:
            fetch-depth: 0

       
        - name: 构建Java环境
          uses: actions/setup-java@v5
          with:
            distribution: "zulu"
            java-version: "17"
            cache: "gradle"

        - name: 缓存Flutter SDK
          id: cache-flutter
          uses: actions/cache@v4
          with:
            path: ./flutter_flutter
            key: ${{ runner.os }}-flutter-ohos-3.41.10-canary1

        - name: 安装Flutter (鸿蒙版本)
          id: flutter-action
          run: |
            # 检查缓存是否恢复成功
            if [ -d "./flutter_flutter" ] && [ -f "./flutter_flutter/bin/flutter" ]; then
              echo "✅ 使用缓存的 Flutter SDK"
            else
              echo "🔄 下载 Flutter SDK..."
              rm -rf ./flutter_flutter
              git clone --depth 1 --branch 3.41.10-ohos-0.0.1-canary1 \
                https://gitcode.com/openharmony-tpc/flutter_flutter.git
            fi
            
            # ✅ 关键：先配置 PATH，再运行 flutter 命令
            echo "📂 配置 Flutter 环境..."
            echo "$(pwd)/flutter_flutter/bin" >> $GITHUB_PATH
            echo "FLUTTER_ROOT=$(pwd)/flutter_flutter" >> $GITHUB_ENV
            
            # ✅ 现在 PATH 已经更新，可以运行 flutter 命令了
            echo "✅ Flutter 环境配置完成"
            flutter --version

       

        - name: 缓存Gradle依赖
          uses: actions/cache@v4
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
              ohos/.gradle
            key: ${{ runner.os }}-ohos-gradle-${{ hashFiles('ohos/**/*.gradle*', 'ohos/**/gradle-wrapper.properties') }}
            restore-keys: |
              ${{ runner.os }}-ohos-gradle-

        - name: 缓存Pub依赖
          uses: actions/cache@v4
          with:
            path: ~/.pub-cache
            key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
            restore-keys: |
              ${{ runner.os }}-pub-

        - name: 获取依赖
          run: |
            flutter pub get

        - name: 配置鸿蒙构建文件
          run: |
           
            
            if [ -f "ohos/build-profile.json5.example" ]; then
              cp ohos/build-profile.json5.example ohos/build-profile.json5
              echo "✅ build-profile.json5 创建成功"
            else
              echo "❌ build-profile.json5.example 不存在！"
              ls -la ohos/
              exit 1
            fi
            
            if [ -f "ohos/gradlew" ]; then
              chmod +x ohos/gradlew
              echo "✅ gradlew 已设置可执行权限"
            fi

        - name: Apply Patch
          shell: pwsh
          run: lib/scripts/patch.ps1 ohos
          continue-on-error: true

       

        # ============ 关键步骤：生成 pili_release.json 并提取版本信息 ============
        - name: 设置版本号并提取信息
          if: ${{ github.event_name == 'workflow_dispatch' }}
          id: version
          shell: pwsh
          run: |
            # 执行构建脚本，生成 pili_release.json
            lib/scripts/build.ps1 ohos
            
            # 读取 pili_release.json 内容
            $json = Get-Content -Path "pili_release.json" -Raw | ConvertFrom-Json
            
            # 提取版本信息
            $piliName = $json.'pili.name'
            $piliCode = $json.'pili.code'
            $piliHash = $json.'pili.hash'
            $piliTime = $json.'pili.time'
            
            # 输出到环境变量
            echo "pili_name=$piliName" >> $env:GITHUB_ENV
            echo "pili_code=$piliCode" >> $env:GITHUB_ENV
            echo "pili_hash=$piliHash" >> $env:GITHUB_ENV
            echo "pili_time=$piliTime" >> $env:GITHUB_ENV
            
            # 输出到步骤输出
            echo "pili_name=$piliName" >> $env:GITHUB_OUTPUT
            echo "pili_code=$piliCode" >> $env:GITHUB_OUTPUT
            echo "pili_hash=$piliHash" >> $env:GITHUB_OUTPUT
            echo "pili_time=$piliTime" >> $env:GITHUB_OUTPUT
            
            # 生成 Tag
            $tag = ${{ github.event.inputs.tag }}
            if ([string]::IsNullOrEmpty($tag)) {
              # 自动生成 Tag
              $tag = "v${piliName}-${piliTime}"
            }
            echo "tag=$tag" >> $env:GITHUB_OUTPUT
            echo "TAG=$tag" >> $env:GITHUB_ENV
            
            Write-Host "📝 版本信息："
            Write-Host "  pili.name: $piliName"
            Write-Host "  pili.code: $piliCode"
            Write-Host "  pili.hash: $piliHash"
            Write-Host "  pili.time: $piliTime"
            Write-Host "  tag: $tag"

        # ============ 显示 pili_release.json 内容（调试用） ============
        - name: 显示 pili_release.json
          if: ${{ github.event_name == 'workflow_dispatch' }}
          run: |
            echo "📄 pili_release.json 内容："
            cat pili_release.json
            echo ""
            echo "📝 提取的版本信息："
            echo "  pili.name: ${{ steps.version.outputs.pili_name }}"
            echo "  pili.code: ${{ steps.version.outputs.pili_code }}"
            echo "  pili.hash: ${{ steps.version.outputs.pili_hash }}"
            echo "  pili.time: ${{ steps.version.outputs.pili_time }}"
            echo "  tag: ${{ steps.version.outputs.tag }}"

        - name: Flutter 构建 Release HAP
          if: ${{ github.event_name == 'workflow_dispatch' }}
          run: |
            flutter build hap \
              --release \
              --enable-experiment=private-named-parameters \
              --dart-define-from-file=pili_release.json \
              --pub

        - name: Flutter 构建 Dev HAP
          if: ${{ github.event_name == 'pull_request' }}
          run: |
            flutter build hap \
              --debug \
              --enable-experiment=private-named-parameters \
              --pub

        # ============ 重命名 HAP 文件（使用 pili_release.json 中的版本） ============
        - name: 重命名 HAP 文件
          run: |
            HAP_PATH="ohos/entry/build/default/outputs/default/entry-default-unsigned.hap"
            
            if [ -f "$HAP_PATH" ]; then
              # 使用从 pili_release.json 提取的版本信息
              if [ "${{ github.event_name }}" == "pull_request" ]; then
                # PR 构建使用 commit hash
                SUFFIX="dev-$(git rev-parse --short HEAD)"
              else
                # Release 构建使用 pili_release.json 中的版本
                PILI_NAME="${{ steps.version.outputs.pili_name }}"
                PILI_CODE="${{ steps.version.outputs.pili_code }}"
                PILI_TIME="${{ steps.version.outputs.pili_time }}"
                
                # 如果版本信息为空，使用默认值
                if [ -z "$PILI_NAME" ]; then
                  PILI_NAME="unknown"
                fi
                if [ -z "$PILI_TIME" ]; then
                  PILI_TIME=$(date +%s)
                fi
                
                SUFFIX="release-${PILI_NAME}-${PILI_TIME}"
              fi
              
              # 复制并重命名
              cp "$HAP_PATH" "PiliPlus_ohos_${SUFFIX}.hap"
              
             
              
              echo "✅ HAP 重命名完成"
              ls -lh PiliPlus_ohos_*.hap
            else
              echo "❌ 未找到 HAP 文件！"
              echo "📂 查找所有 .hap 文件："
              find . -name "*.hap" -type f 2>/dev/null || echo "未找到 .hap 文件"
              exit 1
            fi
          shell: bash
          env:
            VERSION: ${{ steps.version.outputs.pili_name }}

        # ============ 上传 Artifacts ============
        - name: 上传 HAP
          uses: actions/upload-artifact@v7
          with:
            archive: false
            name: HarmonyOS_HAP_${{ steps.version.outputs.pili_name || github.sha }}
            path: PiliPlus_ohos_*.hap

        - name: 上传 Unsigned HAP
          uses: actions/upload-artifact@v7
          if: always()
          with:
            archive: false
            name: HarmonyOS_HAP_unsigned_${{ github.sha }}
            path: ohos/entry/build/default/outputs/default/entry-default-unsigned.hap

      

        # ============ 创建 Release ============
        - name: 创建 Release
          if: ${{ github.event_name == 'workflow_dispatch' }}
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ steps.version.outputs.tag }}
            name: "PiliPlus v${{ steps.version.outputs.pili_name }}"
            body: |
              ## 📦 HarmonyOS HAP Release
              
              ### 版本信息
              - **应用名称**: PiliPlus
              - **版本号**: ${{ steps.version.outputs.pili_name }}
              - **版本代码**: ${{ steps.version.outputs.pili_code }}
              - **Commit Hash**: ${{ steps.version.outputs.pili_hash }}
              - **构建时间戳**: ${{ steps.version.outputs.pili_time }}
              - **Tag**: ${{ steps.version.outputs.tag }}
              - **Git Commit**: ${{ github.sha }}
              
              ### 📱 下载说明
              - **未签名版本**: `PiliPlus_ohos_release-*.hap` - 用于调试和开发
         
              
              ### 🔧 安装方法
              使用 hdc 工具安装：
              ```bash
              # 安装未签名版本
              hdc install PiliPlus_ohos_release-*.hap
              
             