name: Build

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
        paths-ignore:
            - "**.md"
    workflow_dispatch:
        inputs:

            # 鸿蒙构建开关
            build_ohos:
              description: "Build HarmonyOS"
              required: false
              default: true
              type: boolean

            tag:
                description: "tag"
                required: false
                default: ""
                type: string

jobs:
    ohos:
      if: ${{ (github.event_name == 'pull_request' && github.repository == 'bggRGjQaUbCoE/PiliPlus') || github.event.inputs.build_ohos == 'true' }}
      name: Release HarmonyOS HAP
      runs-on: macos-latest
      permissions: write-all

      steps:
        - name: 代码迁出
          uses: actions/checkout@v6
          with:
            fetch-depth: 0

       
        - name: 构建Java环境
          uses: actions/setup-java@v5
          with:
            distribution: "zulu"
            java-version: "17"
            cache: "gradle"

        - name: 缓存 Flutter SDK + 引擎（完整缓存）
          uses: actions/cache@v4
          with:
            path: |
              ./flutter_flutter
              ~/.pub-cache
            key: ${{ runner.os }}-flutter-ohos-full-v1-${{ hashFiles('pubspec.lock') }}
            restore-keys: |
              ${{ runner.os }}-flutter-ohos-full-v1-

        - name: 安装Flutter (鸿蒙版本)
          id: flutter-action
          run: |
            if [ -d "./flutter_flutter" ] && [ -f "./flutter_flutter/bin/flutter" ]; then
              echo "✅ 使用缓存的 Flutter SDK"
              cd flutter_flutter
              git fetch --tags
              git checkout cedbd616b9  # 锁定到与本地相同的 commit
              cd ..
            else
              echo "🔄 下载 Flutter SDK..."
              rm -rf ./flutter_flutter
              git clone --depth 1 --branch 3.41.10-ohos-0.0.1-canary1 \
                https://gitcode.com/openharmony-tpc/flutter_flutter.git
              cd flutter_flutter
              git checkout cedbd616b9
              cd ..
            fi
            
            FLUTTER_ROOT="$(pwd)/flutter_flutter"
            echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV
            echo "$FLUTTER_ROOT/bin" >> $GITHUB_PATH
            
            # 启用 ohos 支持
            $FLUTTER_ROOT/bin/flutter config --enable-ohos
            
            # ⭐ 关键：预下载所有需要的引擎（包括 ohos-arm64）
            echo "🔄 预下载鸿蒙引擎..."
            $FLUTTER_ROOT/bin/flutter precache --ohos
            $FLUTTER_ROOT/bin/flutter precache
            
            # 验证引擎下载完成
            echo "📂 引擎目录："
            ls -la $FLUTTER_ROOT/bin/cache/artifacts/engine/
            
            # 检查 ohos-arm64 是否存在
            if [ -d "$FLUTTER_ROOT/bin/cache/artifacts/engine/ohos-arm64" ]; then
              echo "✅ ohos-arm64 引擎下载成功"
              ls -la $FLUTTER_ROOT/bin/cache/artifacts/engine/ohos-arm64/
            else
              echo "❌ ohos-arm64 引擎下载失败"
              echo "📂 尝试手动下载..."
              $FLUTTER_ROOT/bin/flutter precache --ohos --verbose
              exit 1
            fi
            
            echo "📦 缓存总大小："
            du -sh $FLUTTER_ROOT/bin/cache/
            
            $FLUTTER_ROOT/bin/flutter --version


       

        - name: 缓存Gradle依赖
          uses: actions/cache@v4
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
              ohos/.gradle
            key: ${{ runner.os }}-ohos-gradle-${{ hashFiles('ohos/**/*.gradle*', 'ohos/**/gradle-wrapper.properties') }}
            restore-keys: |
              ${{ runner.os }}-ohos-gradle-

        # 4. 缓存配置 (放在 setup 步骤之后)
        - name: 缓存鸿蒙命令行工具
          uses: actions/cache@v4
          with:
            path: ~/ohos-sdk
            key: ${{ runner.os }}-ohos-sdk-v1
            restore-keys: |
              ${{ runner.os }}-ohos-sdk-

        - name: 下载并配置鸿蒙命令行工具
          id: setup-ohos
          run: |
            # 1. 定义 SDK 路径
            OHOS_SDK_PATH="$HOME/ohos-sdk"
            mkdir -p "$OHOS_SDK_PATH"
            
            # 2. 检查缓存是否已存在
            if [ -d "$OHOS_SDK_PATH/command-line-tools" ] && [ -f "$OHOS_SDK_PATH/command-line-tools/bin/hvigorw" ]; then
              echo "✅ 使用缓存的 Command Line Tools"
            else
              echo "🔄 下载 Command Line Tools (约 1.9GB) ..."
              # 清理可能不完整的目录
              rm -rf "$OHOS_SDK_PATH/command-line-tools"
              
              # 下载
              CLI_TOOL_URL="https://contentcenter-vali-drcn.dbankcdn.cn/pvt_2/DeveloperAlliance_package_901_9/5c/v3/MfVuro7qRrq3ndvYmI0vGw/commandline-tools-mac-arm64-6.1.1.280.zip?HW-CC-KV=V1&HW-CC-Date=20260619T113720Z&HW-CC-Expire=315360000&HW-CC-Sign=E9CDD5C7E82467EDD44A97259749B476D092FBBC7C81081CDD0A66AFA2367CF5"
              
              curl -L -o /tmp/commandline-tools.zip "$CLI_TOOL_URL"
              
              # 检查下载是否成功
              if [ ! -f "/tmp/commandline-tools.zip" ] || [ $(stat -f%z /tmp/commandline-tools.zip) -lt 1000000 ]; then
                echo "❌ 下载失败或文件不完整"
                exit 1
              fi
              
              # 解压
              echo "📦 解压中..."
              unzip -q /tmp/commandline-tools.zip -d "$OHOS_SDK_PATH/"
              rm /tmp/commandline-tools.zip
              
              # 检查解压后的目录结构并修正
              if [ -d "$OHOS_SDK_PATH/command-line-tools" ]; then
                echo "✅ 解压成功"
              elif [ -d "$OHOS_SDK_PATH/commandline-tools-mac-arm64-6.1.1.280" ]; then
                # 如果解压出的是带版本号的目录，重命名
                mv "$OHOS_SDK_PATH/commandline-tools-mac-arm64-6.1.1.280" "$OHOS_SDK_PATH/command-line-tools"
                echo "✅ 目录重命名成功"
              else
                # 查找实际解压出来的目录
                EXTRACTED_DIR=$(find "$OHOS_SDK_PATH" -maxdepth 1 -type d -name "commandline*" | head -1)
                if [ -n "$EXTRACTED_DIR" ] && [ "$EXTRACTED_DIR" != "$OHOS_SDK_PATH" ]; then
                  mv "$EXTRACTED_DIR" "$OHOS_SDK_PATH/command-line-tools"
                  echo "✅ 目录修正成功"
                else
                  echo "❌ 解压失败，找不到 command-line-tools 目录"
                  ls -la "$OHOS_SDK_PATH"
                  exit 1
                fi
              fi
            fi
            
            # 3. 设置环境变量
            CLI_HOME="$OHOS_SDK_PATH/command-line-tools"
            
            # 验证关键目录存在
            if [ ! -d "$CLI_HOME/sdk/default/openharmony" ]; then
              echo "❌ SDK 目录结构不完整"
              echo "📂 实际目录结构："
              find "$CLI_HOME" -maxdepth 3 -type d | head -20
              exit 1
            fi
            
            # 设置 HOS_SDK_HOME (Flutter 构建需要)
            echo "HOS_SDK_HOME=$CLI_HOME/sdk/default/openharmony" >> $GITHUB_ENV
            
            # 添加到 PATH
            echo "$CLI_HOME/bin" >> $GITHUB_PATH
            echo "$CLI_HOME/sdk/default/openharmony/toolchains" >> $GITHUB_PATH
            
            # 配置 ohpm
            if [ -f "$CLI_HOME/bin/ohpm" ]; then
              $CLI_HOME/bin/ohpm config set registry https://ohpm.openharmony.cn/ohpm/ 2>/dev/null || true
              $CLI_HOME/bin/ohpm config set strict_ssl false 2>/dev/null || true
            fi
            
            # 验证安装
            echo "✅ 验证工具链："
            if [ -f "$CLI_HOME/bin/hvigorw" ]; then
              echo "  ✅ hvigorw 可用"
              $CLI_HOME/bin/hvigorw -v 2>/dev/null | head -1 || echo "  ⚠️ hvigorw 版本获取失败"
            fi
            if [ -f "$CLI_HOME/bin/ohpm" ]; then
              echo "  ✅ ohpm 可用"
              $CLI_HOME/bin/ohpm -v 2>/dev/null | head -1 || echo "  ⚠️ ohpm 版本获取失败"
            fi
            if [ -f "$CLI_HOME/sdk/default/openharmony/toolchains/hdc" ]; then
              echo "  ✅ hdc 可用"
            fi
            
            # 显示 SDK 大小
            echo "📦 SDK 大小: $(du -sh $OHOS_SDK_PATH | cut -f1)"

        
        - name: 缓存Pub依赖
          uses: actions/cache@v4
          with:
            path: ~/.pub-cache
            key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
            restore-keys: |
              ${{ runner.os }}-pub-

        - name: 获取依赖
          run: |
            flutter pub get
        - name: 手动创建 ABI 映射
          run: |
            FLUTTER_ROOT="$(pwd)/flutter_flutter"
            DART_SDK="$FLUTTER_ROOT/bin/cache/dart-sdk"
            
            # 创建 ohos_arm64 的 ABI 映射文件
            ABI_FILE="$DART_SDK/lib/abi/ohos_arm64.json"
            mkdir -p "$(dirname $ABI_FILE)"
            
            cat > $ABI_FILE << 'EOF'
            {
              "wordSize": 8,
              "architecture": "arm64",
              "os": "ohos",
              "abi": "arm64",
              "integerSizes": {
                "char": 1,
                "short": 2,
                "int": 4,
                "long": 8,
                "longLong": 8,
                "pointer": 8
              }
            }
            EOF
            
            echo "✅ ABI 映射文件创建成功: $ABI_FILE"
            cat $ABI_FILE
            
        - name: 配置鸿蒙构建文件
          run: |
           
            
            if [ -f "ohos/build-profile.json5.example" ]; then
              cp ohos/build-profile.json5.example ohos/build-profile.json5
              echo "✅ build-profile.json5 创建成功"
            else
              echo "❌ build-profile.json5.example 不存在！"
              ls -la ohos/
              exit 1
            fi
            
            if [ -f "ohos/gradlew" ]; then
              chmod +x ohos/gradlew
              echo "✅ gradlew 已设置可执行权限"
            fi

        - name: Apply Patch
          shell: pwsh
          run: lib/scripts/patch.ps1 ohos
          continue-on-error: true

       

        # ============ 关键步骤：生成 pili_release.json 并提取版本信息 ============
        - name: 设置版本号并提取信息
          if: ${{ github.event_name == 'workflow_dispatch' }}
          id: version
          shell: pwsh
          run: |
            # 执行构建脚本，生成 pili_release.json
            lib/scripts/build.ps1 ohos
            
            # 读取 pili_release.json 内容
            $json = Get-Content -Path "pili_release.json" -Raw | ConvertFrom-Json
            
            # 提取版本信息
            $piliName = $json.'pili.name'
            $piliCode = $json.'pili.code'
            $piliHash = $json.'pili.hash'
            $piliTime = $json.'pili.time'
            
            # 输出到环境变量
            echo "pili_name=$piliName" >> $env:GITHUB_ENV
            echo "pili_code=$piliCode" >> $env:GITHUB_ENV
            echo "pili_hash=$piliHash" >> $env:GITHUB_ENV
            echo "pili_time=$piliTime" >> $env:GITHUB_ENV
            
            # 输出到步骤输出
            echo "pili_name=$piliName" >> $env:GITHUB_OUTPUT
            echo "pili_code=$piliCode" >> $env:GITHUB_OUTPUT
            echo "pili_hash=$piliHash" >> $env:GITHUB_OUTPUT
            echo "pili_time=$piliTime" >> $env:GITHUB_OUTPUT
            
            # 生成 Tag
            $tag = ${{ github.event.inputs.tag }}
            if ([string]::IsNullOrEmpty($tag)) {
              # 自动生成 Tag
              $tag = "v${piliName}-${piliTime}"
            }
            echo "tag=$tag" >> $env:GITHUB_OUTPUT
            echo "TAG=$tag" >> $env:GITHUB_ENV
            
            Write-Host "📝 版本信息："
            Write-Host "  pili.name: $piliName"
            Write-Host "  pili.code: $piliCode"
            Write-Host "  pili.hash: $piliHash"
            Write-Host "  pili.time: $piliTime"
            Write-Host "  tag: $tag"

        # ============ 显示 pili_release.json 内容（调试用） ============
        - name: 显示 pili_release.json
          if: ${{ github.event_name == 'workflow_dispatch' }}
          run: |
            echo "📄 pili_release.json 内容："
            cat pili_release.json
            echo ""
            echo "📝 提取的版本信息："
            echo "  pili.name: ${{ steps.version.outputs.pili_name }}"
            echo "  pili.code: ${{ steps.version.outputs.pili_code }}"
            echo "  pili.hash: ${{ steps.version.outputs.pili_hash }}"
            echo "  pili.time: ${{ steps.version.outputs.pili_time }}"
            echo "  tag: ${{ steps.version.outputs.tag }}"

        - name: Flutter 构建 Release HAP
          if: ${{ github.event_name == 'workflow_dispatch' }}
          run: |
            flutter build hap \
              --release \
              --enable-experiment=private-named-parameters \
              --dart-define-from-file=pili_release.json \
              --pub

        - name: Flutter 构建 Dev HAP
          if: ${{ github.event_name == 'pull_request' }}
          run: |
            flutter build hap \
              --debug \
              --enable-experiment=private-named-parameters \
              --pub

        # ============ 重命名 HAP 文件（使用 pili_release.json 中的版本） ============
        - name: 重命名 HAP 文件
          run: |
            HAP_PATH="ohos/entry/build/default/outputs/default/entry-default-unsigned.hap"
            
            if [ -f "$HAP_PATH" ]; then
              # 使用从 pili_release.json 提取的版本信息
              if [ "${{ github.event_name }}" == "pull_request" ]; then
                # PR 构建使用 commit hash
                SUFFIX="dev-$(git rev-parse --short HEAD)"
              else
                # Release 构建使用 pili_release.json 中的版本
                PILI_NAME="${{ steps.version.outputs.pili_name }}"
                PILI_CODE="${{ steps.version.outputs.pili_code }}"
                PILI_TIME="${{ steps.version.outputs.pili_time }}"
                
                # 如果版本信息为空，使用默认值
                if [ -z "$PILI_NAME" ]; then
                  PILI_NAME="unknown"
                fi
                if [ -z "$PILI_TIME" ]; then
                  PILI_TIME=$(date +%s)
                fi
                
                SUFFIX="release-${PILI_NAME}-${PILI_TIME}"
              fi
              
              # 复制并重命名
              cp "$HAP_PATH" "PiliPlus_ohos_${SUFFIX}.hap"
              
             
              
              echo "✅ HAP 重命名完成"
              ls -lh PiliPlus_ohos_*.hap
            else
              echo "❌ 未找到 HAP 文件！"
              echo "📂 查找所有 .hap 文件："
              find . -name "*.hap" -type f 2>/dev/null || echo "未找到 .hap 文件"
              exit 1
            fi
          shell: bash
          env:
            VERSION: ${{ steps.version.outputs.pili_name }}

        # ============ 上传 Artifacts ============
        - name: 上传 HAP
          uses: actions/upload-artifact@v7
          with:
            archive: false
            name: HarmonyOS_HAP_${{ steps.version.outputs.pili_name || github.sha }}
            path: PiliPlus_ohos_*.hap

        - name: 上传 Unsigned HAP
          uses: actions/upload-artifact@v7
          if: always()
          with:
            archive: false
            name: HarmonyOS_HAP_unsigned_${{ github.sha }}
            path: ohos/entry/build/default/outputs/default/entry-default-unsigned.hap

      

        # ============ 创建 Release ============
        - name: 创建 Release
          if: ${{ github.event_name == 'workflow_dispatch' }}
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ steps.version.outputs.tag }}
            name: "PiliPlus v${{ steps.version.outputs.pili_name }}"
            body: |
              ## 📦 HarmonyOS HAP Release
              
              ### 版本信息
              - **应用名称**: PiliPlus
              - **版本号**: ${{ steps.version.outputs.pili_name }}
              - **版本代码**: ${{ steps.version.outputs.pili_code }}
              - **Commit Hash**: ${{ steps.version.outputs.pili_hash }}
              - **构建时间戳**: ${{ steps.version.outputs.pili_time }}
              - **Tag**: ${{ steps.version.outputs.tag }}
              - **Git Commit**: ${{ github.sha }}
              
              ### 📱 下载说明
              - **未签名版本**: `PiliPlus_ohos_release-*.hap` - 用于调试和开发
         
              
              ### 🔧 安装方法
              使用 hdc 工具安装：
              ```bash
              # 安装未签名版本
              hdc install PiliPlus_ohos_release-*.hap
              
             